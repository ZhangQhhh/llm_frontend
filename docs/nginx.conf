# 定义工作进程数，通常等于CPU核心数
worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # ====== 必须补上这两行，样式才能正常加载 ======
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 100M;
    # 定义缓存路径和参数
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=10g inactive=60m use_temp_path=off;

    # ====== OnlyOffice WebSocket 需要 ======
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    geo $maintenance {
        default 1;
        127.0.0.1 0;           # 允许服务器本机

        # --- 把你用于测试的 IP/IP 段加在这里 ---
        # 1.2.3.4 0;           # 示例：你的家庭/公司出口 IP

        # 我从你的配置中提取了你允许的 IP 段
        53.21.18.98 0;
        53.21.18.97 0;
    }

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # 2. 如果开关文件存在，设置变量
        set $maint_check "0"; # <-- 确保在这里初始化
        if (-f /usr/share/nginx/html/maintenance.on) {
            set $maint_check "1";
        }

        # 3. 拼接 $maintenance 变量 (0 或 1)
        #    如果文件存在 ($maint_check="1") 且 IP不在白名单 ($maintenance="1")
        #    则 $maint_check 最终会变为 "11"
        set $maint_check "${maint_check}${maintenance}";

        # --- 新增步骤：检查请求的是否是维护页本身 ---
        set $is_maint_page "0";
        if ($request_uri = "/maintenance.html") {
            set $is_maint_page "1";
        }

        # 4. 再次拼接变量
        #    "110" = 维护开启 AND IP不在白名单 AND 请求的不是维护页
        #    "111" = 维护开启 AND IP不在白名单 AND 请求的是维护页 (此时不拦截)
        set $maint_check "${maint_check}${is_maint_page}";

        # 5. 最终检查：只在 "110" 时才返回 503
        if ($maint_check = "110") {
            return 503;
        }

        # --- 步骤 3：定义 503 错误页面 (已修改，解决 405 错误) ---
        # (同样在 server 块的顶层)
        error_page 503 = /maintenance.html;

        location = /maintenance.html {
            root /usr/share/nginx/html;
        }

        # --- 静态资源服务 ---
        # location /static/ {
        #     alias /usr/share/nginx/html/static/;
        # }

        location /llm {
            rewrite ^/llm(.*)$ $1 break;

            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 10分钟超时配置
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;

            # 视频流配置
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }


        # ====== 内部视频文件服务（X-Accel-Redirect 专用）======
        # 只能通过 X-Accel-Redirect 访问，外部无法直接访问
        # 使用正则匹配，$1 会自动 URL 解码
        location ~ "^/internal-videos/(.+)$" {
            internal;  # 关键：标记为内部location，外部无法直接访问
            alias /opt/rag_final_project/video/$1;  # $1 是解码后的文件名
                                      
            # 支持Range请求（视频分段播放）
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges";
        }

        # ====== 补回这段丢失的 WebSocket 配置 ======
        location /ws/session {
            # 转发到后端 3000 端口
            proxy_pass http://127.0.0.1:3000/ws/session;

            # 关键：WebSocket 必须的协议升级头
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 传递真实 IP 和 Host
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 超时设置
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # 因为 "/api/knowledge_chat" 比 "/api/" 更长，Nginx 会优先匹配这个规则
        location /api/knowledge_chat {
            proxy_pass http://127.0.0.1:5000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LLM Debug 页面路由
        location = /debug {
            proxy_pass http://127.0.0.1:5000/debug;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # LLM Debug API 路由
        location /api/debug {
            proxy_pass http://127.0.0.1:5000/api/debug;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;  # 支持流式输出
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3000/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 资料中心视频上传大小限制 5000MB
            client_max_body_size 5000m;

            # 10分钟超时配置
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;

            # 代理缓冲区配置（解决大响应 ERR_CONTENT_LENGTH_MISMATCH）
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 256k;
        }

        # --- API 代理 (优化后版本) ---
        location /tt/qwen/ {
            allow 10.124.146.0/23;
            allow 53.21.16.0/22;
            deny all;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            rewrite ^/tt/qwen/(.*)$ /$1 break;

            proxy_pass http://53.2.102.1:2025;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # 针对本地千问api的代理
        location /qwen32/ {
            allow 10.124.146.0/23;
            allow 53.21.16.0/22;
            deny all;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            rewrite ^/qwen32/(.*)$ /v1/$1 break;

            proxy_pass http://127.0.0.1:1025;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        # ====== 建议同时补回文档服务配置 ======
        location /docx {
            rewrite ^/docx(.*)$ $1 break;
            proxy_pass http://127.0.0.1:5090;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docx;
        }
        
        location /docx-static/ {
            proxy_pass http://127.0.0.1:5090/docx-static/;
        }

        location = /cloud {
            return 301 /cloud/;
        }
        # ================== Nextcloud 走 /cloud/ ==================
        # /cloud/... -> http://127.0.0.1:7080/...
        location ^~ /cloud/ {
            proxy_pass http://127.0.0.1:7080/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Forwarded-Prefix /cloud;

            client_max_body_size 2g;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;

            proxy_buffering off;
            proxy_request_buffering off;
        }


        # ================== OnlyOffice 走 /onlyoffice/ ==================
        location ^~ /onlyoffice/ {
            proxy_pass http://127.0.0.1:7082/;

            # ✅ 必须：让 /onlyoffice/.../doc/.../c/ 的 websocket 握手成功
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            client_max_body_size 2g;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;

            proxy_buffering off;
            proxy_request_buffering off;
          

        }


        # OnlyOffice WebSocket（必须）
        location ^~ /onlyoffice/websocket/ {
            proxy_pass http://127.0.0.1:7082/websocket/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600;
        }

        # /dav -> http://127.0.0.1:8030/
        location = /dav {
            return 301 /dav/;
        }

        location ^~ /dav/ {
            proxy_pass http://127.0.0.1:8030/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /dav;

            # upload limit
            client_max_body_size 2g;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;

            proxy_buffering off;
            proxy_request_buffering off;
        }

        # --- 根目录和主页面 ---
        location / {
            root /usr/share/nginx/html/dist;
            index index.html index.htm;
            # 补上这一行，防止刷新 404
            try_files $uri $uri/ /index.html;
        }

        # --- AI 聊天页面 ---
  
        location = /ai/ {
            root /usr/share/nginx/html;
            try_files /ai.html =404;
        }

        # 关键：同域反代到你的 deepseek 服务
        location /ai-api/ {
            proxy_pass http://53.3.1.4:34567/v1/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # 流式输出必须关缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600;
            add_header X-Accel-Buffering no;
        }

        location /supervisory {
            root /usr/share/nginx/html;
            try_files /demo.html =404;
        }

        # --- UI 代理 (例如 Gradio/Streamlit) ---
        location /ui/ {
            proxy_pass http://127.0.0.1:7860/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # --- Qdrant 反向代理最终配置（开始） ---

        # 规则1：主入口，用于浏览器直接访问
        location /qdrant/ {
            rewrite ^/qdrant/?$ /qdrant/dashboard/ permanent;

            proxy_pass http://127.0.0.1:6333/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 规则2：捕获所有发往根目录的 API 请求
        location ~ ^/(collections|cluster|telemetry|locks) {
            proxy_pass http://127.0.0.1:6333;
        }

        # 规则3：捕获所有发往根目录的 UI 静态资源
        location /dashboard/ {
            proxy_pass http://127.0.0.1:6333;
        }

        # --- Qdrant 反向代理最终配置（结束） ---

        # --- TensorBoard 代理 ---
        location /zqboard/ {
            proxy_pass http://127.0.0.1:6006/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
